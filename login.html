<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso - UNACHI</title>
<script src="auth.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,#0a1628,#1a2a4a);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-container{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px;width:420px;text-align:center}
.logo{font-size:48px;margin-bottom:10px}
h1{color:#fff;font-size:22px;margin-bottom:5px}
.sub{color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:20px}
.input-group{margin-bottom:16px;text-align:left}
label{color:rgba(255,255,255,0.7);font-size:13px;display:block;margin-bottom:5px}
input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:15px;outline:none;transition:border-color .3s}
input:focus{border-color:#4a90d9}
input::placeholder{color:rgba(255,255,255,0.3)}
.btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#4a90d9,#357abd);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .2s,opacity .3s;margin-top:8px}
.btn:hover{transform:translateY(-2px);opacity:.9}
.error{color:#ff6b6b;font-size:13px;margin-top:10px;display:none}

</style>
</head>
<body>
<div class="login-container">
<div class="logo">🕵️</div>
<h1>UNACHI</h1>
<p class="sub">Sistema de Estudio - Identificación Criminal</p>
<div class="input-group">
<label>Usuario</label>
<input type="text" id="username" placeholder="Ingrese su usuario" autofocus>
</div>
<div class="input-group">
<label>Contraseña</label>
<input type="password" id="password" placeholder="Ingrese su contraseña" onkeydown="if(event.key==='Enter')doLogin()">
</div>
<button class="btn" onclick="doLogin()">Ingresar</button>
<p class="error" id="errorMsg">Usuario o contraseña incorrectos</p>

</div>
<script>
function doLogin() {
    var u = document.getElementById('username').value;
    var p = document.getElementById('password').value;
    if (login(u, p)) {
        window.location.href = 'index.html';
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}
if (isLoggedIn()) { window.location.href = 'index.html'; }
</script>
</body>
</html>
